<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chat Assistant</title>

  <!-- Google Fonts: Sora for headings, DM Sans for body -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Sora:wght@600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="sidebar.css">
</head>
<body>
  <!-- Side Panel Container -->
  <div class="side-panel">

    <!-- Header -->
    <header class="panel-header">
      <h1 class="panel-title">AI Chat Assistant</h1>
      <div class="header-accent"></div>
    </header>

    <!-- Chat Messages Area -->
    <main class="chat-area" id="chatArea" role="log" aria-live="polite" aria-label="Chat messages">
      <!-- Welcome message -->
      <div class="welcome-message">
        <svg class="welcome-icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
        </svg>
        <h2>Welcome!</h2>
        <p>Start a conversation to chat.</p>
      </div>

      <!-- Messages will be dynamically inserted here -->
    </main>

    <!-- Composer Bar -->
    <div class="composer-bar">

      <!-- Image Preview (shown when image is attached) -->
      <div id="imagePreview" class="image-preview" style="display: none;">
        <img id="imagePreviewImg" src="" alt="Attached image">
        <button id="removeImageBtn" class="remove-image-btn" title="Remove image" type="button">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>

      <div class="composer-container">
        <!-- Multi-line input -->
        <textarea
          id="messageInput"
          class="message-input"
          placeholder="Type your message..."
          rows="1"
          aria-label="Message input"
          maxlength="2000"
        ></textarea>

        <!-- Action Buttons -->
        <div class="composer-actions">
          <!-- Templates Button -->
          <button
            id="templatesBtn"
            class="templates-btn"
            aria-label="Quick templates"
            title="Quick automation templates"
            type="button"
          >
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="7"></rect>
              <rect x="14" y="3" width="7" height="7"></rect>
              <rect x="3" y="14" width="7" height="7"></rect>
              <rect x="14" y="14" width="7" height="7"></rect>
            </svg>
          </button>

          <!-- Image Attach Button -->
          <button
            id="imageAttachBtn"
            class="image-attach-btn"
            aria-label="Attach image"
            title="Attach an image (Ctrl+V to paste)"
            type="button"
          >
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
              <circle cx="8.5" cy="8.5" r="1.5"></circle>
              <polyline points="21 15 16 10 5 21"></polyline>
            </svg>
          </button>
          <input type="file" id="imageFileInput" accept="image/png,image/jpeg,image/webp" style="display:none;">

          <!-- Stop Button (hidden by default, shown during automation) -->
          <button
            id="stopBtn"
            class="stop-btn"
            aria-label="Stop automation"
            title="Stop the running automation"
            type="button"
            style="display: none;"
          >
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="15" y1="9" x2="9" y2="15"></line>
              <line x1="9" y1="9" x2="15" y2="15"></line>
            </svg>
          </button>

          <!-- Speaker Toggle Button (visible only during audio playback) -->
          <button
            id="speakerToggleBtn"
            class="speaker-toggle-btn"
            aria-label="Toggle audio"
            title="Audio playing — click to mute"
            type="button"
            style="display: none;"
          >
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
              <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
            </svg>
          </button>

          <!-- Send Button -->
          <button
            id="sendBtn"
            class="send-btn"
            aria-label="Send message"
            title="Send message (Enter)"
            type="button"
          >
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
      </div>

      <!-- Templates Panel (hidden by default) -->
      <div id="templatesPanel" class="templates-panel" style="display: none;"></div>

      <!-- Status/Notification Area -->
      <div id="statusToast" class="status-toast" role="status" aria-live="polite"></div>
    </div>

  </div>

  <script src="sidebar.js"></script>
</body>
</html>
