<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Sora:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Extension colors */
      --color-primary: #016B61;
      --color-primary-dark: #014d46;
      --color-primary-light: #70B2B2;
      --color-accent: #9ECFD4;
      --color-accent-light: #C5E5E7;
      --color-cream: #E5E9C5;
      --color-bg-primary: #ffffff;
      --color-bg-secondary: #F8FAFA;
      --color-surface: #ffffff;
      --color-text-primary: #1a1a1a;
      --color-text-secondary: #4a5568;
      --color-error: #dc2626;
      --font-heading: 'Sora', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-body);
      background: linear-gradient(to bottom, var(--color-bg-secondary) 0%, var(--color-surface) 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .voice-container {
      background: var(--color-surface);
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 16px 40px rgba(1, 107, 97, 0.15);
      border: 2px solid rgba(1, 107, 97, 0.1);
    }

    /* Header */
    .voice-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .voice-header h1 {
      font-family: var(--font-heading);
      font-size: 28px;
      color: var(--color-primary);
      margin-bottom: 8px;
      font-weight: 700;
    }

    .voice-header p {
      color: var(--color-text-secondary);
      font-size: 14px;
      font-weight: 500;
    }

    /* Microphone Container */
    .mic-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-bottom: 32px;
    }

    /* Microphone Button */
    .mic-button {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-light) 100%);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 24px rgba(1, 107, 97, 0.25);
      transition: all 0.3s ease;
      position: relative;
    }

    .mic-button:hover {
      transform: scale(1.05);
      box-shadow: 0 12px 32px rgba(1, 107, 97, 0.35);
    }

    .mic-button:active {
      transform: scale(0.98);
    }

    /* Listening state */
    .mic-button.listening {
      background: linear-gradient(135deg, var(--color-error) 0%, #b91c1c 100%);
      animation: pulse-mic 1.5s ease-in-out infinite;
    }

    @keyframes pulse-mic {
      0%, 100% {
        transform: scale(1);
        box-shadow: 0 8px 24px rgba(220, 38, 38, 0.4);
      }
      50% {
        transform: scale(1.08);
        box-shadow: 0 12px 40px rgba(220, 38, 38, 0.6);
      }
    }

    /* Pulse rings animation */
    .mic-button.listening::before,
    .mic-button.listening::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 3px solid var(--color-error);
      opacity: 0;
      animation: pulse-ring 1.5s ease-out infinite;
    }

    .mic-button.listening::after {
      animation-delay: 0.75s;
    }

    @keyframes pulse-ring {
      0% {
        transform: scale(1);
        opacity: 0.8;
      }
      100% {
        transform: scale(1.5);
        opacity: 0;
      }
    }

    /* Mic icon */
    .mic-icon {
      width: 56px;
      height: 56px;
    }

    /* Status text */
    .status-text {
      margin-top: 24px;
      text-align: center;
      font-size: 16px;
      font-weight: 600;
      color: var(--color-primary);
      min-height: 24px;
    }

    .status-text.listening {
      color: var(--color-error);
    }

    /* Transcript display */
    .transcript-container {
      background: var(--color-bg-secondary);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 24px;
      min-height: 100px;
      border: 2px solid rgba(1, 107, 97, 0.1);
    }

    .transcript-text {
      color: var(--color-text-primary);
      font-size: 15px;
      line-height: 1.6;
      word-wrap: break-word;
    }

    .transcript-placeholder {
      color: var(--color-text-secondary);
      font-style: italic;
      opacity: 0.7;
    }

    .transcript-interim {
      color: var(--color-text-secondary);
      opacity: 0.6;
      font-style: italic;
    }

    /* Conversation Section */
    .conversation-section {
      width: 100%;
      margin-top: 24px;
    }

    .conversation-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 4px 12px 4px;
      color: var(--color-primary);
      font-size: 14px;
      font-weight: 600;
      border-bottom: 2px solid rgba(1, 107, 97, 0.1);
      margin-bottom: 12px;
    }

    .conversation-header svg {
      stroke: var(--color-primary);
    }

    /* Conversation history */
    .conversation {
      background: var(--color-surface);
      border-radius: 12px;
      padding: 16px;
      max-height: 250px;
      overflow-y: auto;
      border: 1px solid rgba(1, 107, 97, 0.1);
    }

    .conversation::-webkit-scrollbar {
      width: 6px;
    }

    .conversation::-webkit-scrollbar-thumb {
      background: var(--color-primary-light);
      border-radius: 10px;
    }

    .message {
      margin-bottom: 12px;
      padding: 10px 14px;
      border-radius: 12px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.user {
      background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
      color: white;
      text-align: right;
      margin-left: 40px;
      border-bottom-right-radius: 4px;
    }

    .message.assistant {
      background: var(--color-bg-secondary);
      color: var(--color-text-primary);
      border: 1px solid rgba(1, 107, 97, 0.15);
      margin-right: 40px;
      border-bottom-left-radius: 4px;
    }

    .message-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
    }

    .message-icon {
      flex-shrink: 0;
    }

    .message.user .message-icon {
      stroke: white;
    }

    .message.assistant .message-icon {
      stroke: var(--color-primary);
    }

    .message-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      opacity: 0.9;
      letter-spacing: 0.5px;
    }

    .message-text {
      font-size: 14px;
      line-height: 1.5;
      padding-left: 24px;
    }

    .conversation-empty {
      text-align: center;
      color: var(--color-text-secondary);
      font-size: 13px;
      opacity: 0.7;
      padding: 20px;
    }
  </style>
</head>
<body>
  <div class="voice-container">
    <!-- Header -->
    <div class="voice-header">
      <h1>🎤 Voice Assistant</h1>
      <p>Click the microphone and start speaking</p>
    </div>

    <!-- Microphone -->
    <div class="mic-container">
      <button id="micBtn" class="mic-button" aria-label="Toggle voice input">
        <svg class="mic-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
          <line x1="12" y1="19" x2="12" y2="23"></line>
          <line x1="8" y1="23" x2="16" y2="23"></line>
        </svg>
      </button>
      <div id="statusText" class="status-text">Click to start listening</div>
    </div>

    <!-- Transcript -->
    <div class="transcript-container">
      <div id="transcript" class="transcript-text">
        <div class="transcript-placeholder">Your speech will appear here...</div>
      </div>
    </div>

    <!-- Conversation History -->
    <div class="conversation-section">
      <div class="conversation-header">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
        </svg>
        <span>Conversation</span>
      </div>
      <div id="conversation" class="conversation">
        <div class="conversation-empty">Start speaking to begin conversation...</div>
      </div>
    </div>
  </div>

  <script src="voice.js"></script>
</body>
</html>
