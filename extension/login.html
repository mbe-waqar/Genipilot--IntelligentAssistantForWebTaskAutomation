<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google-client-id" content="265869413628-8a9rlgem2m7p8qlith3d9bel2vkru8vu.apps.googleusercontent.com">
  <title>Login - AI Chat Assistant</title>

  <!-- Google Fonts: Sora for headings, DM Sans for body -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Sora:wght@600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="login.css">
</head>
<body>
  <!-- Side Panel Container -->
  <div class="side-panel">

    <!-- Header -->
    <header class="panel-header">
      <h1 class="panel-title">AI Chat Assistant</h1>
      <div class="header-accent"></div>
    </header>

    <!-- Login Content Area -->
    <main class="login-area">

      <!-- Tab Navigation -->
      <div class="tab-navigation">
        <button class="tab-btn active" id="loginTab" aria-selected="true">Login</button>
        <button class="tab-btn" id="signupTab" aria-selected="false">Sign Up</button>
      </div>

      <!-- Login Form -->
      <div class="form-container" id="loginForm">
        <!-- Welcome Header -->
        <div class="form-header">
          <h1 class="form-title">Welcome Back!</h1>
          <p class="form-subtitle">Login to access your account</p>
        </div>

        <!-- Google Sign In Button -->
        <button class="google-btn" id="googleLoginBtn" type="button">
          <svg class="google-icon" width="20" height="20" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Sign in with Google
        </button>

        <!-- Divider -->
        <div class="divider">
          <span class="divider-text">Or continue with email</span>
        </div>

        <!-- Email/Password Form -->
        <form id="loginFormElement" novalidate>
          <!-- Email Field -->
          <div class="form-group">
            <label for="email" class="form-label">Email Address</label>
            <input
              type="email"
              id="email"
              class="form-input"
              placeholder="you@example.com"
              autocomplete="email"
              required
            />
          </div>

          <!-- Password Field -->
          <div class="form-group">
            <label for="password" class="form-label">Password</label>
            <input
              type="password"
              id="password"
              class="form-input"
              placeholder="••••••••"
              autocomplete="current-password"
              required
            />
          </div>

          <!-- Remember Me & Forgot Password -->
          <div class="form-footer">
            <label class="checkbox-container">
              <input type="checkbox" id="rememberMe" />
              <span class="checkbox-label">Remember me</span>
            </label>
            <a href="#" class="forgot-link" id="forgotPassword">Forgot Password?</a>
          </div>

          <!-- Login Button -->
          <button type="submit" class="submit-btn" id="loginBtn">
            Login
          </button>
        </form>

        <!-- Sign Up Link -->
        <div class="switch-form">
          <span class="switch-text">Don't have an account?</span>
          <a href="#" class="switch-link" id="switchToSignup">Sign Up</a>
        </div>
      </div>

      <!-- Sign Up Form (Initially Hidden) -->
      <div class="form-container hidden" id="signupForm">
        <!-- Welcome Header -->
        <div class="form-header">
          <h1 class="form-title">Create Account</h1>
          <p class="form-subtitle">Sign up to get started</p>
        </div>

        <!-- Google Sign Up Button -->
        <button class="google-btn" id="googleSignupBtn" type="button">
          <svg class="google-icon" width="20" height="20" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Sign up with Google
        </button>

        <!-- Divider -->
        <div class="divider">
          <span class="divider-text">Or continue with email</span>
        </div>

        <!-- Sign Up Email/Password Form -->
        <form id="signupFormElement" novalidate>
          <!-- Name Field -->
          <div class="form-group">
            <label for="signupName" class="form-label">Full Name</label>
            <input
              type="text"
              id="signupName"
              class="form-input"
              placeholder="John Doe"
              autocomplete="name"
              required
            />
          </div>

          <!-- Email Field -->
          <div class="form-group">
            <label for="signupEmail" class="form-label">Email Address</label>
            <input
              type="email"
              id="signupEmail"
              class="form-input"
              placeholder="you@example.com"
              autocomplete="email"
              required
            />
          </div>

          <!-- Password Field -->
          <div class="form-group">
            <label for="signupPassword" class="form-label">Password</label>
            <input
              type="password"
              id="signupPassword"
              class="form-input"
              placeholder="••••••••"
              autocomplete="new-password"
              required
            />
          </div>

          <!-- Sign Up Button -->
          <button type="submit" class="submit-btn" id="signupBtn">
            Sign Up
          </button>
        </form>

        <!-- Login Link -->
        <div class="switch-form">
          <span class="switch-text">Already have an account?</span>
          <a href="#" class="switch-link" id="switchToLogin">Login</a>
        </div>
      </div>

    </main>

  </div>

  <!-- Toast Notification -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="login.js"></script>

</body>
</html>
